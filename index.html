<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>valentin barrio</title>
  <link rel="icon" type="image/png" href="assets/navicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Z-1: Motivos flotantes (behind everything) -->
  <div id="motifs-layer"></div>

  <!-- Color layers (behind header/footer, for center-wipe effect) -->
  <div id="color-layer-header" class="color-layer color-layer--header"></div>
  <div id="color-layer-footer" class="color-layer color-layer--footer"></div>

  <!-- Z-3: Header -->
  <header id="header">
    <div class="header__left"></div>
    <div class="header__center">
      <span id="header-name">VALENTIN BARRIO</span>
    </div>
    <div class="header__right">
      <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">MENU</button>
    </div>
    <!-- Marquee for project view (hidden by default) -->
    <div id="header-marquee" class="header__marquee header__marquee--hidden">
      <div class="marquee__track">
        <span class="marquee__text"></span>
      </div>
    </div>
  </header>

  <!-- Z-2: Scroll content area -->
  <main id="scroll-host" class="scroll-host">
    <div id="scroll-content"></div>
  </main>

  <!-- Z-2: Project view (hidden by default) -->
  <main id="project-host" class="scroll-host project-host--hidden">
    <div id="project-content"></div>
  </main>

  <!-- Z-3: Footer (arrows + project name center) -->
  <footer id="footer">
    <div class="footer__nav">
      <button id="nav-prev" class="footer__arrow">&lt;</button>
      <button id="footer-project-name" class="footer__project-name"></button>
      <button id="nav-next" class="footer__arrow">&gt;</button>
    </div>
  </footer>

  <!-- Z-20: Menu modal -->
  <div id="menu-modal" class="menu-modal menu-modal--hidden menu-modal--from-bottom">
    <div class="menu-modal__backdrop"></div>
    <div class="menu-modal__content">
      <!-- X close buttons in all 4 corners -->
      <button class="menu-modal__close menu-modal__close--tl" aria-label="Close">&times;</button>
      <button class="menu-modal__close menu-modal__close--tr" aria-label="Close">&times;</button>
      <button class="menu-modal__close menu-modal__close--bl" aria-label="Close">&times;</button>
      <button class="menu-modal__close menu-modal__close--br" aria-label="Close">&times;</button>
      <!-- Color reveal layer for hover -->
      <div class="menu-modal__color-layer"></div>
      <div class="menu-modal__section">
        <button class="menu-modal__item menu-modal__item--active" data-mode="commercial">COMERCIAL</button>
        <button class="menu-modal__item" data-mode="personal">PERSONAL</button>
      </div>
      <div class="menu-modal__section" id="menu-categories">
        <button class="menu-modal__item menu-modal__item--active" data-category="all">ALL</button>
        <button class="menu-modal__item" data-category="club">CLUB</button>
        <button class="menu-modal__item" data-category="festival">FESTIVAL</button>
        <button class="menu-modal__item" data-category="editorial">EDITORIAL</button>
      </div>
    </div>
  </div>

  <!-- Z-10: Transition grid overlay -->
  <div id="transition-grid" class="transition-grid"></div>

  <!-- Settings panel (motif styles) -->
  <div id="settings-panel" class="settings-panel settings-panel--hidden">
    <div class="settings-panel__header">
      <span>SETTINGS</span>
      <button class="settings-panel__close">&times;</button>
    </div>
    <div class="settings-panel__body">
      <div class="settings-panel__group">
        <label class="settings-panel__label">MOTIF STYLE</label>
        <label class="settings-panel__radio"><input type="radio" name="motif-style" value="organic"> Flotacion organica</label>
        <label class="settings-panel__radio"><input type="radio" name="motif-style" value="drift"> Deriva lenta</label>
        <label class="settings-panel__radio"><input type="radio" name="motif-style" value="breath"> Respiracion</label>
        <label class="settings-panel__radio"><input type="radio" name="motif-style" value="orbital"> Orbital</label>
        <label class="settings-panel__radio"><input type="radio" name="motif-style" value="mixed" checked> Mixto</label>
      </div>
    </div>
  </div>
  <button id="settings-toggle" class="settings-toggle" aria-label="Settings">&#9881;</button>

  <script src="js/utils.js"></script>
  <script src="js/color-wipe.js"></script>
  <script src="js/motifs.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/header.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/scroll.js"></script>
  <script src="js/project.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
