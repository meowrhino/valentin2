<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>valentin barrio</title>
  <link rel="icon" type="image/png" href="assets/navicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loader — pure CSS, visible before JS executes -->
  <div id="loader" class="loader">
    <span class="loader__text">LOADING</span>
  </div>

  <!-- Z-1: Motivos flotantes -->
  <div id="motifs-layer"></div>

  <!-- Z-3: Header with blend-mode "hole" system -->
  <div class="bar-wrapper bar-wrapper--top">
    <div class="bar-color" id="header-color"></div>
    <header id="header" class="bar">
      <div class="bar__left">
        <button id="header-category" class="bar__label" aria-label="Open menu"></button>
      </div>
      <div class="bar__center">
        <span id="header-name" class="bar__name">VALENTIN BARRIO</span>
      </div>
      <div class="bar__right">
        <button id="menu-toggle" class="bar__label" aria-label="Open menu">MENU</button>
      </div>
    </header>
  </div>

  <!-- Z-2: Scroll content area (home) -->
  <main id="scroll-host" class="scroll-host">
    <div id="scroll-content"></div>
  </main>

  <!-- Z-2: Project view (hidden by default) -->
  <main id="project-host" class="scroll-host project-host--hidden">
    <div id="project-content"></div>
  </main>

  <!-- Z-3: Footer with blend-mode "hole" system -->
  <div class="bar-wrapper bar-wrapper--bottom">
    <div class="bar-color" id="footer-color"></div>
    <footer id="footer" class="bar">
      <div class="bar__left">
        <button id="nav-prev" class="bar__arrow">&lt;</button>
      </div>
      <div class="bar__center">
        <button id="footer-center" class="bar__label"></button>
      </div>
      <div class="bar__right">
        <button id="nav-next" class="bar__arrow">&gt;</button>
      </div>
    </footer>
  </div>

  <!-- Z-15: Lightbox (fullscreen image viewer) -->
  <div id="lightbox" class="lightbox lightbox--hidden">
    <button class="lightbox__close lightbox__close--tl" aria-label="Close">&times;</button>
    <button class="lightbox__close lightbox__close--tr" aria-label="Close">&times;</button>
    <button class="lightbox__close lightbox__close--bl" aria-label="Close">&times;</button>
    <button class="lightbox__close lightbox__close--br" aria-label="Close">&times;</button>
    <img class="lightbox__img" alt="" />
  </div>

  <!-- Z-20: Menu modal -->
  <div id="menu-modal" class="menu-modal menu-modal--hidden">
    <div class="menu-modal__backdrop"></div>
    <div class="menu-modal__content">
      <button class="menu-modal__close menu-modal__close--tl" aria-label="Close">&times;</button>
      <button class="menu-modal__close menu-modal__close--tr" aria-label="Close">&times;</button>
      <button class="menu-modal__close menu-modal__close--bl" aria-label="Close">&times;</button>
      <button class="menu-modal__close menu-modal__close--br" aria-label="Close">&times;</button>
      <div class="menu-modal__section">
        <button class="menu-modal__item menu-modal__item--active" data-mode="commercial">COMERCIAL</button>
        <button class="menu-modal__item" data-mode="personal">PERSONAL</button>
        <button class="menu-modal__item" data-mode="about">ABOUT</button>
      </div>
      <div class="menu-modal__section" id="menu-categories">
        <button class="menu-modal__item menu-modal__item--active" data-category="all">ALL</button>
        <button class="menu-modal__item" data-category="club">CLUB</button>
        <button class="menu-modal__item" data-category="festival">FESTIVAL</button>
        <button class="menu-modal__item" data-category="editorial">EDITORIAL</button>
      </div>
      <div class="menu-modal__section menu-modal__motifs">
        <div class="menu-modal__motifs-options">
          <button class="menu-modal__motif-btn menu-modal__motif-btn--active" data-motif="orbital">ORBITAL</button>
          <button class="menu-modal__motif-btn" data-motif="organic">ORGANIC</button>
          <button class="menu-modal__motif-btn" data-motif="drift">DRIFT</button>
          <button class="menu-modal__motif-btn" data-motif="breath">BREATH</button>
          <button class="menu-modal__motif-btn" data-motif="mixed">MIXED</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Z-9: Horizontal wipe overlay (mode/category changes) -->
  <div id="wipe-overlay" class="wipe-overlay"></div>

  <!-- Z-10: Transition grid overlay (content area only) -->
  <div id="transition-grid" class="transition-grid"></div>

  <!-- Z-25: Project navigation overlay -->
  <div id="project-nav" class="project-nav project-nav--hidden">
    <div class="project-nav__backdrop"></div>
    <div class="project-nav__content">
      <button class="project-nav__close project-nav__close--tl" aria-label="Close">&times;</button>
      <button class="project-nav__close project-nav__close--tr" aria-label="Close">&times;</button>
      <button class="project-nav__close project-nav__close--bl" aria-label="Close">&times;</button>
      <button class="project-nav__close project-nav__close--br" aria-label="Close">&times;</button>
      <div class="project-nav__list"></div>
    </div>
  </div>

  <script defer src="js/utils.js"></script>
  <script defer src="js/color-wipe.js"></script>
  <script defer src="js/motifs.js"></script>
  <script defer src="js/transitions.js"></script>
  <script defer src="js/settings.js"></script>
  <script defer src="js/header.js"></script>
  <script defer src="js/menu.js"></script>
  <script defer src="js/footer.js"></script>
  <script defer src="js/lightbox.js"></script>
  <script defer src="js/project-nav.js"></script>
  <script defer src="js/scroll.js"></script>
  <script defer src="js/project.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
